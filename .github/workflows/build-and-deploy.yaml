name: Build and Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  packages: write

jobs:
  # ─── Detecta quais apps mudaram ──────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs-app/**'
            mcp:
              - 'mcp-server/**'

  # ─── Build docs-app ──────────────────────────────────────────────────────────
  build-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push calangoui-docs
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs-app/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/by2-studio/calangoui-docs:${{ github.sha }}
            ghcr.io/by2-studio/calangoui-docs:latest
          cache-from: type=registry,ref=ghcr.io/by2-studio/calangoui-docs:latest
          cache-to: type=inline

      - name: Update manifest
        run: |
          sed -i "s|ghcr.io/by2-studio/calangoui-docs:.*|ghcr.io/by2-studio/calangoui-docs:${{ github.sha }}|g" \
            docs-app/k8s/overlays/prod/deployment-patch.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs-app/k8s/overlays/prod/deployment-patch.yaml
          git commit -m "chore: deploy calangoui-docs ${{ github.sha }}" || exit 0
          git pull --rebase origin main
          git push

  # ─── Build mcp-server ────────────────────────────────────────────────────────
  build-mcp:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push calangoui-mcp
        uses: docker/build-push-action@v6
        with:
          context: mcp-server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/by2-studio/calangoui-mcp:${{ github.sha }}
            ghcr.io/by2-studio/calangoui-mcp:latest
          cache-from: type=registry,ref=ghcr.io/by2-studio/calangoui-mcp:latest
          cache-to: type=inline

      - name: Update manifest
        run: |
          sed -i "s|ghcr.io/by2-studio/calangoui-mcp:.*|ghcr.io/by2-studio/calangoui-mcp:${{ github.sha }}|g" \
            mcp-server/k8s/overlays/prod/deployment-patch.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mcp-server/k8s/overlays/prod/deployment-patch.yaml
          git commit -m "chore: deploy calangoui-mcp ${{ github.sha }}" || exit 0
          git pull --rebase origin main
          git push
