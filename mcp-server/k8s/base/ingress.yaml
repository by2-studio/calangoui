apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: calangoui-mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mcp.calangoui.by2.com.br
      secretName: calangoui-mcp-tls
  rules:
    - host: mcp.calangoui.by2.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: calangoui-mcp
                port:
                  number: 8080
